<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS-Tools Monitor - Minecraft Player Surveillance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            height: 100vh;
            gap: 1px;
            background: #30363d;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            background: #0d1117;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            background: #161b22;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: bold;
            color: #58a6ff;
            margin-bottom: 10px;
        }

        .stats-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-box {
            background: #0d1117;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #30363d;
            text-align: center;
            font-size: 12px;
        }

        .stat-value {
            font-weight: bold;
            color: #58a6ff;
            font-size: 14px;
        }

        .stat-label {
            color: #8b949e;
            font-size: 10px;
        }

        .players-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .player-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .player-item:hover {
            background: #1c2128;
            border-color: #58a6ff;
        }

        .player-item.active {
            background: #1f6feb;
            border-color: #58a6ff;
            color: #fff;
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .player-status {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8b949e;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .status-online {
            background: #238636;
        }

        .status-suspicious {
            background: #da3633;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            display: flex;
            flex-direction: column;
            background: #0d1117;
            overflow: hidden;
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161b22;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #58a6ff;
        }

        .header-info {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #238636;
            font-weight: bold;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #238636;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .screen-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: auto;
        }

        .screen-frame {
            position: relative;
            width: 100%;
            max-width: 100%;
            background: #000;
            border: 2px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .screen-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .screen-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #c9d1d9;
        }

        .screen-fps {
            color: #58a6ff;
            font-weight: bold;
        }

        .no-stream {
            display: flex;
            justify-content: center;
            align-items: center;
            color: #8b949e;
            font-size: 18px;
        }

        /* ============ RIGHT PANEL ============ */
        .right-panel {
            background: #0d1117;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            background: #161b22;
            font-weight: bold;
            color: #58a6ff;
            font-size: 14px;
        }

        .activity-feed {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .activity-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #161b22;
            border-left: 3px solid #58a6ff;
            border-radius: 3px;
            font-size: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .activity-time {
            color: #8b949e;
            font-size: 10px;
            margin-bottom: 3px;
        }

        .activity-desc {
            color: #c9d1d9;
        }

        .severity-critical {
            border-left-color: #da3633;
            background: rgba(218, 54, 51, 0.1);
        }

        .severity-high {
            border-left-color: #fb8500;
            background: rgba(251, 133, 0, 0.1);
        }

        .severity-medium {
            border-left-color: #d29922;
            background: rgba(210, 153, 34, 0.1);
        }

        .severity-low {
            border-left-color: #238636;
            background: rgba(35, 134, 54, 0.1);
        }

        .severity-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-right: 4px;
        }

        .severity-badge.critical {
            background: #da3633;
            color: #fff;
        }

        .severity-badge.high {
            background: #fb8500;
            color: #000;
        }

        .severity-badge.medium {
            background: #d29922;
            color: #000;
        }

        .severity-badge.low {
            background: #238636;
            color: #fff;
        }

        /* ============ SCROLLBARS ============ */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1400px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar, .right-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">🔴 Players</div>
                <div class="stats-mini">
                    <div class="stat-box">
                        <div class="stat-value" id="totalPlayers">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="onlinePlayers">0</div>
                        <div class="stat-label">Online</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="screenshotsCount">0</div>
                        <div class="stat-label">Screenshots</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="suspiciousCount">0</div>
                        <div class="stat-label">Suspicious</div>
                    </div>
                </div>
            </div>
            <div class="players-list" id="playersList"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="header">
                <div class="header-title">🎮 Minecraft Player Monitor</div>
                <div class="header-info">
                    <div class="live-indicator">
                        <div class="live-dot"></div>
                        LIVE
                    </div>
                    <div id="currentTime">--:--:--</div>
                </div>
            </div>
            <div class="screen-container">
                <div class="screen-frame">
                    <img class="screen-image" id="screenImage" src="" alt="Player Screen">
                    <div class="screen-info">
                        <span id="playerNameDisplay">No Player Selected</span>
                        <span class="screen-fps">FPS: <span id="fpsCounter">0</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <div class="panel-header">📊 Activity Log</div>
            <div class="activity-feed" id="activityFeed">
                <div style="color: #8b949e; text-align: center; padding: 20px;">
                    Waiting for activities...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Initialize WebSocket connection
        const socket = io();
        let selectedPlayer = null;
        let players = {};
        let activityBuffer = [];
        let frameCount = 0;
        let lastFpsUpdate = Date.now();

        // Update time
        setInterval(() => {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString();
        }, 1000);

        // Socket Events
        socket.on('connect', () => {
            console.log('Connected to SS-Tools Monitor');
            updateStats();
        });

        socket.on('player_monitored', (data) => {
            console.log('New player monitored:', data);
            players[data.player_id] = data.session;
            updatePlayersList();
            updateStats();
        });

        socket.on('screen_updated', (data) => {
            if (selectedPlayer === data.player_id) {
                frameCount++;
                updateFpsCounter();
            }
        });

        socket.on('activity_logged', (data) => {
            addActivity(data);
            updateStats();
        });

        socket.on('player_stats_updated', (data) => {
            if (players[data.player_id]) {
                players[data.player_id] = { ...players[data.player_id], ...data.stats };
                updatePlayersList();
                if (selectedPlayer === data.player_id) {
                    updatePlayerDisplay();
                }
            }
        });

        // UI Functions
        function updatePlayersList() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';

            Object.entries(players).forEach(([playerId, player]) => {
                const item = document.createElement('div');
                item.className = `player-item ${selectedPlayer === playerId ? 'active' : ''}`;
                
                const status = player.suspicious_count > 5 ? 'status-suspicious' : 'status-online';
                const statusText = player.suspicious_count > 5 ? 'SUSPICIOUS' : 'MONITORING';

                item.innerHTML = `
                    <div class="player-name">${player.name}</div>
                    <div class="player-status">
                        <span><span class="status-indicator ${status}"></span>${statusText}</span>
                        <span>${player.screenshot_count} 📸</span>
                    </div>
                `;

                item.onclick = () => selectPlayer(playerId, player);
                list.appendChild(item);
            });
        }

        function selectPlayer(playerId, player) {
            selectedPlayer = playerId;
            updatePlayersList();
            updatePlayerDisplay();
            frameCount = 0;
            lastFpsUpdate = Date.now();

            // Load player's current screen
            fetch(`/api/player/${playerId}/screen`)
                .then(r => r.json())
                .then(data => {
                    if (data.screen) {
                        document.getElementById('screenImage').src = `data:image/jpeg;base64,${data.screen}`;
                    }
                });
        }

        function updatePlayerDisplay() {
            if (!selectedPlayer || !players[selectedPlayer]) return;

            const player = players[selectedPlayer];
            document.getElementById('playerNameDisplay').textContent = player.name;
        }

        function updateFpsCounter() {
            const now = Date.now();
            if (now - lastFpsUpdate >= 1000) {
                document.getElementById('fpsCounter').textContent = frameCount;
                frameCount = 0;
                lastFpsUpdate = now;
            }
        }

        function addActivity(data) {
            const feed = document.getElementById('activityFeed');
            
            // Clear placeholder if exists
            if (feed.children.length === 1 && feed.children[0].textContent.includes('Waiting')) {
                feed.innerHTML = '';
            }

            const item = document.createElement('div');
            const time = new Date(data.timestamp).toLocaleTimeString();
            const severity = data.severity >= 80 ? 'critical' : 
                           data.severity >= 60 ? 'high' :
                           data.severity >= 40 ? 'medium' : 'low';
            const severityText = severity.toUpperCase();

            item.className = `activity-item severity-${severity}`;
            item.innerHTML = `
                <div class="activity-time">${time}</div>
                <div class="activity-desc">
                    <span class="severity-badge ${severity}">${severityText}</span>
                    ${data.activity}
                </div>
            `;

            feed.insertBefore(item, feed.firstChild);

            // Keep only last 50 items
            while (feed.children.length > 50) {
                feed.removeChild(feed.lastChild);
            }
        }

        function updateStats() {
            fetch('/api/stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('totalPlayers').textContent = data.total_players;
                    document.getElementById('onlinePlayers').textContent = data.online_players;
                    document.getElementById('screenshotsCount').textContent = data.total_screenshots;
                    document.getElementById('suspiciousCount').textContent = data.total_suspicious_activities;
                });
        }

        // Auto-refresh stats every 5 seconds
        setInterval(updateStats, 5000);

        // Load initial players
        fetch('/api/players')
            .then(r => r.json())
            .then(data => {
                data.players.forEach(player => {
                    players[player.id] = player;
                });
                updatePlayersList();
                updateStats();
            });

        // Poll for screen updates
        setInterval(() => {
            if (selectedPlayer && players[selectedPlayer]) {
                fetch(`/api/player/${selectedPlayer}/screen`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.screen) {
                            document.getElementById('screenImage').src = `data:image/jpeg;base64,${data.screen}`;
                            socket.emit('screen_updated', {
                                player_id: selectedPlayer,
                                timestamp: new Date().toISOString()
                            });
                        }
                    });
            }
        }, 500);  // Update every 500ms

        // Load activity history
        fetch('/api/activity?limit=20')
            .then(r => r.json())
            .then(data => {
                data.activities.forEach(activity => {
                    addActivity({
                        timestamp: activity.timestamp,
                        activity: activity.type,
                        severity: activity.severity
                    });
                });
            });
    </script>
</body>
</html>
