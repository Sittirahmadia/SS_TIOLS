name: Build SS-TOOLS Ultimate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyQt6-Charts requests psutil pydantic
    
    - name: Build executable
      run: |
        pyinstaller ss_tools_ultimate.spec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: SS-TOOLS-Ultimate
        path: dist/SS-TOOLS-Ultimate.exe
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/SS-TOOLS-Ultimate.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
